<!-- Page metadata for JS -->
<meta name="page-lang" content="{{ page.lang | default: '' }}">
<meta name="page-lang-pair" content="{{ page.lang_pair | default: '' }}">
<meta name="page-source-path" content="{{ page.path }}">

<!-- Mona Sans Variable Font -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<style>
@font-face {
  font-family: 'Mona Sans';
  src: url('https://cdn.jsdelivr.net/npm/@fontsource-variable/mona-sans/files/mona-sans-latin-wght-normal.woff2') format('woff2');
  font-weight: 200 900;
  font-style: normal;
  font-display: swap;
}

/* ===== Global font ===== */
body, .site-title, .nav-list .nav-list-link, .search-input,
.btn, .site-button, .main-content, .breadcrumb-nav,
h1, h2, h3, h4, h5, h6, p, li, td, th, blockquote,
.site-footer, label, input, summary {
  font-family: 'Mona Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif !important;
}

/* ===== Aux nav icon buttons ===== */
.aux-nav-list {
  display: flex;
  align-items: center;
  gap: 0.35rem;
}
.icon-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  padding: 0;
  background: none;
  border: 1px solid transparent;
  border-radius: 8px;
  color: #8b949e;
  cursor: pointer;
  transition: all 0.15s ease;
}
.icon-btn:hover {
  color: #e6edf3;
  background-color: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.1);
}
.icon-btn svg { width: 18px; height: 18px; fill: currentColor; }
.icon-btn.gh-link svg { width: 20px; height: 20px; }
.icon-btn.flag-btn { font-size: 20px; line-height: 1; }

/* ===== Dark theme polish ===== */
.side-bar { border-right-color: rgba(255,255,255,0.06) !important; }
.site-title { font-weight: 700 !important; letter-spacing: -0.01em; }
.main-content h1 { font-weight: 800; letter-spacing: -0.02em; }
.main-content h2 { font-weight: 700; letter-spacing: -0.01em; margin-top: 2em; }
.main-content h3 { font-weight: 600; }
.site-footer { font-size: 0.75rem !important; opacity: 0.7; }
blockquote { border-left-width: 3px !important; border-radius: 0 6px 6px 0; padding: 0.8rem 1rem !important; }
pre, .highlight pre { border-radius: 8px !important; padding: 1rem !important; }
code { border-radius: 4px; padding: 0.15em 0.35em; }
table { border-radius: 8px; overflow: hidden; border-collapse: separate; border-spacing: 0; }
hr { opacity: 0.15; }

/* ===== Homepage ===== */
.hero { padding: 1.5rem 0 0.5rem; }
.hero-title { font-size: 2.2rem !important; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.3rem !important; }
.hero-subtitle { font-size: 1.1rem; opacity: 0.7; margin-bottom: 0; font-weight: 400; }
.card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1rem; margin-top: 1rem; }
.card { border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 1.25rem 1.5rem; transition: border-color 0.2s, transform 0.15s; }
.card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
.card-title { margin-top: 0 !important; margin-bottom: 0.4rem !important; }
.card-link { display: block; font-weight: 500; margin-top: 0.3rem; font-size: 0.95rem; }

/* ===== Download button ===== */
.dl-btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.9rem; border-radius: 8px; font-size: 0.82rem; font-weight: 500; text-decoration: none !important; border: 1px solid rgba(255,255,255,0.12); color: #8b949e; background: rgba(255,255,255,0.04); transition: all 0.15s ease; margin-bottom: 1.5rem; }
.dl-btn:hover { color: #e6edf3; border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); }
.dl-btn svg { width: 15px; height: 15px; fill: currentColor; }
html[data-theme="light"] .dl-btn { color: #57606a; border-color: #e1e4e8; background: #f6f8fa; }
html[data-theme="light"] .dl-btn:hover { color: #0969da; border-color: #0969da; background: rgba(9,105,218,0.04); }

/* ===== Changelog chips ===== */
.changelog-meta { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 0.5rem 0 0.75rem; align-items: center; }
.chip { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.78rem; font-weight: 500; line-height: 1.4; white-space: nowrap; border: 1px solid transparent; }
.chip-date { background-color: rgba(139,148,158,0.15); color: #8b949e; }
.chip-type { font-weight: 600; }
.chip-type[data-type="release"] { background-color: rgba(52,199,89,0.15); color: #34c759; border-color: rgba(52,199,89,0.2); }
.chip-type[data-type="improvement"] { background-color: rgba(44,132,250,0.15); color: #2c84fa; border-color: rgba(44,132,250,0.2); }
.chip-type[data-type="retired"] { background-color: rgba(255,69,58,0.15); color: #ff453a; border-color: rgba(255,69,58,0.2); }
.chip-category { background-color: rgba(175,130,255,0.12); color: #af82ff; border-color: rgba(175,130,255,0.2); }
.chip-link a { color: inherit; text-decoration: none; }
.chip-link a:hover { text-decoration: underline; }
.chip-link { background-color: rgba(139,148,158,0.1); color: #8b949e; cursor: pointer; }

/* Light mode chip overrides */
html[data-theme="light"] .chip-date { background-color: #eaeef2; color: #57606a; }
html[data-theme="light"] .chip-type[data-type="release"] { background-color: rgba(22,163,74,0.1); color: #16a34a; border-color: rgba(22,163,74,0.2); }
html[data-theme="light"] .chip-type[data-type="improvement"] { background-color: rgba(9,105,218,0.1); color: #0969da; border-color: rgba(9,105,218,0.2); }
html[data-theme="light"] .chip-type[data-type="retired"] { background-color: rgba(207,34,46,0.1); color: #cf222e; border-color: rgba(207,34,46,0.2); }
html[data-theme="light"] .chip-category { background-color: rgba(130,80,223,0.08); color: #8250df; border-color: rgba(130,80,223,0.15); }
html[data-theme="light"] .chip-link { background-color: #f6f8fa; color: #57606a; }

})();

<!-- Toggle logic -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  var auxNav = document.querySelector('.aux-nav-list');
  if (!auxNav) {
    var header = document.querySelector('.main-header');
    if (!header) return;
    var nav = document.createElement('nav');
    nav.setAttribute('aria-label', 'Auxiliary');
    nav.className = 'aux-nav';
    var ul = document.createElement('ul');
    ul.className = 'aux-nav-list';
    nav.appendChild(ul);
    header.appendChild(nav);
    auxNav = ul;
  }
  auxNav.innerHTML = '';

  var baseurl = '{{ site.baseurl }}';
  var pageLang = document.querySelector('meta[name="page-lang"]').content;
  var pageLangPair = document.querySelector('meta[name="page-lang-pair"]').content;

  var langPairs = {
    {% for p in site.pages %}{% if p.lang_pair %}'{{ p.url | replace: ".md", ".html" }}':'{{ p.lang_pair }}',{% endif %}{% endfor %}
  };

  var translations = {
    'Home': 'ホーム', 'Changelog': '変更履歴', 'GitHub Copilot': 'GitHub Copilot',
    'GitHub Actions': 'GitHub Actions', 'GHEC': 'GHEC', 'GHES': 'GHES',
    'Copilot CLI': 'Copilot CLI', 'Agentic Workflows': 'Agentic Workflows'
  };
  var reverseTr = {};
  for (var k in translations) reverseTr[translations[k]] = k;

  function mkBtn(label, svg) {
    var b = document.createElement('button');
    b.className = 'icon-btn'; b.setAttribute('aria-label', label); b.setAttribute('title', label);
    b.innerHTML = svg;
    var li = document.createElement('li'); li.className = 'aux-nav-list-item'; li.appendChild(b);
    return { btn: b, li: li };
  }
  function mkLink(label, href, svg) {
    var a = document.createElement('a');
    a.className = 'icon-btn gh-link'; a.setAttribute('aria-label', label); a.setAttribute('title', label);
    a.setAttribute('href', href); a.setAttribute('target', '_blank'); a.setAttribute('rel', 'noopener');
    a.innerHTML = svg;
    var li = document.createElement('li'); li.className = 'aux-nav-list-item'; li.appendChild(a);
    return { link: a, li: li };
  }

  var sunSvg = '<svg viewBox="0 0 16 16"><path d="M8 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm0 1.5a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11ZM8 0a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0V.75A.75.75 0 0 1 8 0Zm0 13a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 8 13ZM2.343 2.343a.75.75 0 0 1 1.061 0l1.06 1.061a.75.75 0 0 1-1.06 1.06L2.343 3.404a.75.75 0 0 1 0-1.06Zm9.193 9.193a.75.75 0 0 1 1.06 0l1.061 1.06a.75.75 0 0 1-1.06 1.061l-1.061-1.06a.75.75 0 0 1 0-1.061ZM0 8a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 0 1.5H.75A.75.75 0 0 1 0 8Zm13 0a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 0 1.5h-1.5A.75.75 0 0 1 13 8ZM2.343 13.657a.75.75 0 0 1 0-1.06l1.06-1.061a.75.75 0 1 1 1.061 1.06l-1.06 1.061a.75.75 0 0 1-1.061 0Zm9.193-9.193a.75.75 0 0 1 0-1.06l1.061-1.061a.75.75 0 1 1 1.06 1.06l-1.06 1.061a.75.75 0 0 1-1.06 0Z"/></svg>';
  var moonSvg = '<svg viewBox="0 0 16 16"><path d="M9.598 1.591a.749.749 0 0 1 .785-.175 7.001 7.001 0 1 1-8.967 8.967.75.75 0 0 1 .961-.96 5.5 5.5 0 0 0 7.046-7.046.75.75 0 0 1 .175-.786Zm1.616 1.945a7 7 0 0 1-7.678 7.678 5.499 5.499 0 1 0 7.678-7.678Z"/></svg>';
  var flagJP = '\uD83C\uDDEF\uD83C\uDDF5';
  var flagGB = '\uD83C\uDDEC\uD83C\uDDE7';
  var ghSvg = '<svg viewBox="0 0 16 16"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/></svg>';

  /* --- Language --- */
  var currentLang = pageLang || localStorage.getItem('jtd-lang') || 'en';
  localStorage.setItem('jtd-lang', currentLang);
  var lang = mkBtn(currentLang === 'en' ? 'Switch to Japanese' : 'Switch to English', '');
  lang.btn.classList.add('flag-btn');
  lang.btn.textContent = currentLang === 'en' ? flagJP : flagGB;
  lang.btn.addEventListener('click', function() {
    var newLang = currentLang === 'en' ? 'ja' : 'en';
    localStorage.setItem('jtd-lang', newLang);
    if (pageLangPair) { window.location.href = baseurl + pageLangPair; }
    else { currentLang = newLang; lang.btn.textContent = newLang === 'en' ? flagJP : flagGB; lang.btn.setAttribute('title', newLang === 'en' ? 'Switch to Japanese' : 'Switch to English'); applyNavLang(newLang); }
  });
  auxNav.appendChild(lang.li);

  /* --- Theme --- */
  var currentTheme = localStorage.getItem('jtd-theme') || 'dark';
  var theme = mkBtn(currentTheme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode', currentTheme === 'dark' ? sunSvg : moonSvg);
  theme.btn.addEventListener('click', function() {
    var t = document.documentElement.getAttribute('data-theme');
    var n = t === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', n);
    localStorage.setItem('jtd-theme', n);
    theme.btn.innerHTML = n === 'dark' ? sunSvg : moonSvg;
    theme.btn.setAttribute('title', n === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
  });
  auxNav.appendChild(theme.li);

  /* --- GitHub --- */
  var gh = mkLink('View on GitHub', 'https://github.com/theomonfort/theomonfort', ghSvg);
  auxNav.appendChild(gh.li);

  /* --- Nav translations --- */
  var contentTr = {
    "Hey, I'm Theo 👋": "こんにちは、Theo です 👋",
    "Senior Solutions Architect at GitHub, based in Japan — covering Automotive & Manufacturing sectors. I share notes on GitHub products, demos, and walkthroughs here.": "GitHub シニアソリューションズアーキテクト。日本拠点で自動車・製造業セクターを担当。GitHub 製品のメモやデモ、ウォークスルーをここで共有しています。",
    "📰 Changelog": "📰 変更履歴",
    "Curated changelog highlights from the GitHub ecosystem.": "GitHub エコシステムの厳選された変更履歴ハイライト。",
    "Browse changelog →": "変更履歴を見る →",
    "Back to top": "トップに戻る",
    "GitHub Copilot": "GitHub Copilot",
    "Guides, demos, and walkthroughs for GitHub Copilot.": "GitHub Copilot のガイド、デモ、ウォークスルー。",
    "GitHub Actions": "GitHub Actions",
    "Tips, patterns, and best practices for GitHub Actions workflows.": "GitHub Actions ワークフローのヒント、パターン、ベストプラクティス。",
    "GitHub Enterprise Cloud": "GitHub Enterprise Cloud",
    "Administration guides and reference material for GHEC.": "GHEC の管理ガイドとリファレンス資料。",
    "GitHub Enterprise Server": "GitHub Enterprise Server",
    "Administration guides and reference material for GHES.": "GHES の管理ガイドとリファレンス資料。"
  };
  var reverseContentTr = {};
  for (var ck in contentTr) reverseContentTr[contentTr[ck]] = ck;

  function applyNavLang(lang) {
    document.querySelectorAll('.nav-list-link').forEach(function(el) {
      var txt = el.textContent.trim();
      if (lang === 'ja') { if (translations[txt]) { el.setAttribute('data-en', txt); el.textContent = translations[txt]; } }
      else { var en = el.getAttribute('data-en') || reverseTr[txt]; if (en) { el.textContent = en; el.removeAttribute('data-en'); } }
    });
    document.querySelectorAll('.nav-list-link').forEach(function(el) {
      var href = el.getAttribute('href'); if (!href) return;
      var path = href.replace(baseurl, '');
      if (lang === 'ja' && langPairs[path]) { el.setAttribute('data-href-en', href); el.setAttribute('href', baseurl + langPairs[path]); }
      else if (lang === 'en' && el.getAttribute('data-href-en')) { el.setAttribute('href', el.getAttribute('data-href-en')); el.removeAttribute('data-href-en'); }
    });
    document.querySelectorAll('.breadcrumb-nav-list-item span, .breadcrumb-nav-list-item a').forEach(function(el) {
      var txt = el.textContent.trim();
      if (lang === 'ja' && translations[txt]) { el.setAttribute('data-en', txt); el.textContent = translations[txt]; }
      else if (lang === 'en') { var en = el.getAttribute('data-en') || reverseTr[txt]; if (en) { el.textContent = en; el.removeAttribute('data-en'); } }
    });
    /* Translate page content */
    var targets = document.querySelectorAll('.hero-title, .hero-subtitle, .card-title, .card p, .card-link, .main-content h1, .main-content > p, #back-to-top');
    targets.forEach(function(el) {
      var txt = el.textContent.trim();
      if (lang === 'ja' && contentTr[txt]) { el.setAttribute('data-en', txt); el.textContent = contentTr[txt]; }
      else if (lang === 'en') { var en = el.getAttribute('data-en') || reverseContentTr[txt]; if (en) { el.textContent = en; el.removeAttribute('data-en'); } }
    });
  }
  if (currentLang === 'ja') applyNavLang('ja');

  /* --- Nav expand/collapse state persistence --- */
  function getNavKey(btn) {
    var link = btn.parentElement.querySelector('.nav-list-link');
    return link ? link.getAttribute('href') || link.textContent.trim() : null;
  }
  function saveNavState() {
    var state = {};
    document.querySelectorAll('.nav-list-expander').forEach(function(btn) {
      var key = getNavKey(btn);
      if (key) state[key] = btn.getAttribute('aria-pressed') === 'true';
    });
    localStorage.setItem('jtd-nav-state', JSON.stringify(state));
  }
  function restoreNavState() {
    var raw = localStorage.getItem('jtd-nav-state');
    if (!raw) return;
    try { var state = JSON.parse(raw); } catch(e) { return; }
    document.querySelectorAll('.nav-list-expander').forEach(function(btn) {
      var key = getNavKey(btn);
      if (key && typeof state[key] === 'boolean') {
        var isOpen = btn.getAttribute('aria-pressed') === 'true';
        if (state[key] !== isOpen) btn.click();
      }
    });
  }
  restoreNavState();
  document.querySelectorAll('.nav-list-expander').forEach(function(btn) {
    btn.addEventListener('click', function() { setTimeout(saveNavState, 50); });
  });

  /* --- Download button --- */
  var srcPath = document.querySelector('meta[name="page-source-path"]');
  if (srcPath && srcPath.content) {
    var rawUrl = 'https://raw.githubusercontent.com/theomonfort/theomonfort/main/' + srcPath.content;
    var fname = srcPath.content.split('/').pop();
    var dlSvg = '<svg viewBox="0 0 16 16"><path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14ZM7.25 7.689V2a.75.75 0 0 1 1.5 0v5.689l1.97-1.969a.749.749 0 1 1 1.06 1.06l-3.25 3.25a.749.749 0 0 1-1.06 0L4.22 6.78a.749.749 0 1 1 1.06-1.06l1.97 1.969Z"/></svg>';
    var mainContent = document.getElementById('main-content');
    if (mainContent) {
      var h1 = mainContent.querySelector('h1');
      var target = h1 ? h1.nextElementSibling : mainContent.firstChild;
      var dlLink = document.createElement('a');
      dlLink.className = 'dl-btn';
      dlLink.href = rawUrl;
      dlLink.setAttribute('download', fname);
      dlLink.innerHTML = dlSvg + ' Download ' + fname;
      if (target) mainContent.insertBefore(dlLink, target);
      else mainContent.appendChild(dlLink);
    }
  }
});
</script>
