<!-- Mona Sans Variable Font -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<style>
@font-face {
  font-family: 'Mona Sans';
  src: url('https://cdn.jsdelivr.net/npm/@fontsource-variable/mona-sans/files/mona-sans-latin-wght-normal.woff2') format('woff2');
  font-weight: 200 900;
  font-style: normal;
  font-display: swap;
}

/* ===== Global font ===== */
body, .site-title, .nav-list .nav-list-link, .search-input,
.btn, .site-button, .main-content, .breadcrumb-nav,
h1, h2, h3, h4, h5, h6, p, li, td, th, blockquote,
.site-footer, label, input, summary {
  font-family: 'Mona Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif !important;
}

/* ===== Aux nav icon buttons ===== */
.aux-nav-list { display: flex; align-items: center; gap: 0.35rem; }
.icon-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; padding: 0; background: none;
  border: 1px solid transparent; border-radius: 8px; color: #8b949e;
  cursor: pointer; transition: all 0.15s ease;
}
.icon-btn:hover { color: #e6edf3; background-color: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.1); }
.icon-btn svg { width: 18px; height: 18px; fill: currentColor; }
.icon-btn.gh-link svg { width: 20px; height: 20px; }

/* ===== Dark theme polish ===== */
.side-bar { border-right-color: rgba(255,255,255,0.06) !important; }
.site-title { font-weight: 700 !important; letter-spacing: -0.01em; }
.main-content h1 { font-weight: 800; letter-spacing: -0.02em; }
.main-content h2 { font-weight: 700; letter-spacing: -0.01em; margin-top: 2em; }
.main-content h3 { font-weight: 600; }
.site-footer { font-size: 0.75rem !important; opacity: 0.7; }
blockquote { border-left-width: 3px !important; border-radius: 0 6px 6px 0; padding: 0.8rem 1rem !important; }
pre, .highlight pre { border-radius: 8px !important; padding: 1rem !important; }
code { border-radius: 4px; padding: 0.15em 0.35em; }
table { border-radius: 8px; overflow: hidden; border-collapse: separate; border-spacing: 0; }
hr { opacity: 0.15; }

/* ===== Homepage ===== */
.hero { padding: 1.5rem 0 0.5rem; }
.hero-title { font-size: 2.2rem !important; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.3rem !important; }
.hero-subtitle { font-size: 1.1rem; opacity: 0.7; margin-bottom: 0; font-weight: 400; }
.card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1rem; margin-top: 1rem; }
.card { border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 1.25rem 1.5rem; transition: border-color 0.2s, transform 0.15s; }
.card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
.card-title { margin-top: 0 !important; margin-bottom: 0.4rem !important; }
.card-link { display: block; font-weight: 500; margin-top: 0.3rem; font-size: 0.95rem; }

/* ===== Links grid ===== */
.links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 0.75rem; margin-top: 1rem; }
.link-card {
  display: flex; align-items: flex-start; gap: 0.9rem; padding: 1rem 1.2rem;
  border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
  text-decoration: none !important; color: inherit;
  transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
}
.link-card:hover { border-color: rgba(44,132,250,0.4); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(44,132,250,0.08); }
.link-icon { font-size: 1.6rem; line-height: 1; flex-shrink: 0; margin-top: 0.1rem; }
.link-body { display: flex; flex-direction: column; gap: 0.2rem; min-width: 0; }
.link-name { font-weight: 600; font-size: 0.95rem; color: #e6edf3; }
.link-desc { font-size: 0.82rem; opacity: 0.75; line-height: 1.45; }

/* ===== Expandable skill cards ===== */
.skill-card { cursor: pointer; }
.skill-card .link-card { margin-bottom: 0; transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s, border-radius 0.2s; }
.skill-card .skill-install {
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height 0.3s ease, opacity 0.25s ease, padding 0.3s ease;
  border: 1px solid rgba(255,255,255,0.08); border-top: none;
  border-radius: 0 0 12px 12px; padding: 0 1.2rem;
  background: rgba(255,255,255,0.02);
}
.skill-card.open .link-card { border-radius: 12px 12px 0 0; border-bottom-color: transparent; }
.skill-card.open .skill-install { max-height: 400px; opacity: 1; padding: 0.8rem 1.2rem 1rem; }
.skill-arrow { font-size: 0.7rem; opacity: 0.5; transition: transform 0.2s; display: inline-block; margin-left: 0.3rem; }
.skill-card.open .skill-arrow { transform: rotate(90deg); }
.install-label { display: block; font-size: 0.75rem; font-weight: 600; opacity: 0.6; margin-top: 0.5rem; margin-bottom: 0.3rem; }
.install-label:first-child { margin-top: 0; }
.install-code {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 0.72rem; line-height: 1.5; padding: 0.6rem 0.8rem;
  background: rgba(0,0,0,0.3); border-radius: 6px;
  word-break: break-all; white-space: pre-wrap;
  color: #e6edf3; user-select: all; cursor: text;
}
html[data-theme="light"] .skill-install { border-color: #e1e4e8; background: #f6f8fa; }
html[data-theme="light"] .install-code { background: #eaeef2; color: #1f2328; }

/* ===== Light theme overrides ===== */
html[data-theme="light"] body { background-color: #ffffff; color: #1f2328; }
html[data-theme="light"] h1, html[data-theme="light"] h2, html[data-theme="light"] h3,
html[data-theme="light"] h4, html[data-theme="light"] h5, html[data-theme="light"] h6 { color: #1f2328; }
html[data-theme="light"] .side-bar { background-color: #f6f8fa; border-right: 1px solid #e1e4e8 !important; }
html[data-theme="light"] .site-header { border-bottom-color: #e1e4e8; }
html[data-theme="light"] .site-title { color: #1f2328; }
html[data-theme="light"] .site-title:hover { background-image: none; color: #0969da; }
html[data-theme="light"] .nav-list-link { color: #1f2328; }
html[data-theme="light"] .nav-list .nav-list-item .nav-list-link:hover,
html[data-theme="light"] .nav-list .nav-list-item .nav-list-link.active { background-image: none; background-color: #eaeef2; color: #1f2328; }
html[data-theme="light"] .main, html[data-theme="light"] .main-header,
html[data-theme="light"] .side-bar+.main .main-header { background-color: #ffffff; }
html[data-theme="light"] .main-header { border-bottom-color: #e1e4e8; }
html[data-theme="light"] .icon-btn { color: #57606a; }
html[data-theme="light"] .icon-btn:hover { color: #1f2328; background-color: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.08); }
html[data-theme="light"] .search-input { background-color: #f6f8fa; border-color: #e1e4e8; color: #1f2328; }
html[data-theme="light"] .search-input::placeholder { color: #656d76; }
html[data-theme="light"] .search-results { background-color: #fff; border-color: #e1e4e8; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
html[data-theme="light"] a { color: #0969da; }
html[data-theme="light"] .main-content a { color: #0969da; }
html[data-theme="light"] code { background-color: #eff1f3; color: #1f2328; }
html[data-theme="light"] pre.highlight, html[data-theme="light"] .highlight pre,
html[data-theme="light"] pre { background-color: #f6f8fa; color: #1f2328; }
html[data-theme="light"] th, html[data-theme="light"] td { border-color: #e1e4e8; color: #1f2328; }
html[data-theme="light"] hr { border-color: #e1e4e8; }
html[data-theme="light"] .site-footer { border-top-color: #e1e4e8; color: #656d76; }
html[data-theme="light"] .site-footer a { color: #0969da; }
html[data-theme="light"] blockquote { border-left-color: #e1e4e8; color: #57606a; }
html[data-theme="light"] .card { border-color: #e1e4e8; }
html[data-theme="light"] .card:hover { border-color: #0969da; box-shadow: 0 2px 8px rgba(9,105,218,0.08); }
html[data-theme="light"] .link-card { border-color: #e1e4e8; }
html[data-theme="light"] .link-card:hover { border-color: #0969da; box-shadow: 0 4px 12px rgba(9,105,218,0.08); }
html[data-theme="light"] .link-name { color: #1f2328; }
html[data-theme="light"] .link-desc { color: #57606a; }
html[data-theme="light"] .back-to-top { color: #656d76; background-color: #fff; border-color: #e1e4e8; }
</style>

<!-- Immediate theme init -->
<script>
(function(){
  var t = localStorage.getItem('jtd-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>

<!-- Theme toggle + GitHub link -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  var auxNav = document.querySelector('.aux-nav-list');
  if (!auxNav) {
    var header = document.querySelector('.main-header');
    if (!header) return;
    var nav = document.createElement('nav');
    nav.setAttribute('aria-label', 'Auxiliary');
    nav.className = 'aux-nav';
    var ul = document.createElement('ul');
    ul.className = 'aux-nav-list';
    nav.appendChild(ul);
    header.appendChild(nav);
    auxNav = ul;
  }
  auxNav.innerHTML = '';

  function mkBtn(label, svg) {
    var b = document.createElement('button');
    b.className = 'icon-btn'; b.setAttribute('aria-label', label); b.setAttribute('title', label);
    b.innerHTML = svg;
    var li = document.createElement('li'); li.className = 'aux-nav-list-item'; li.appendChild(b);
    return { btn: b, li: li };
  }
  function mkLink(label, href, svg) {
    var a = document.createElement('a');
    a.className = 'icon-btn gh-link'; a.setAttribute('aria-label', label); a.setAttribute('title', label);
    a.setAttribute('href', href); a.setAttribute('target', '_blank'); a.setAttribute('rel', 'noopener');
    a.innerHTML = svg;
    var li = document.createElement('li'); li.className = 'aux-nav-list-item'; li.appendChild(a);
    return { link: a, li: li };
  }

  var sunSvg = '<svg viewBox="0 0 16 16"><path d="M8 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm0 1.5a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11ZM8 0a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0V.75A.75.75 0 0 1 8 0Zm0 13a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 8 13ZM2.343 2.343a.75.75 0 0 1 1.061 0l1.06 1.061a.75.75 0 0 1-1.06 1.06L2.343 3.404a.75.75 0 0 1 0-1.06Zm9.193 9.193a.75.75 0 0 1 1.06 0l1.061 1.06a.75.75 0 0 1-1.06 1.061l-1.061-1.06a.75.75 0 0 1 0-1.061ZM0 8a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 0 1.5H.75A.75.75 0 0 1 0 8Zm13 0a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 0 1.5h-1.5A.75.75 0 0 1 13 8ZM2.343 13.657a.75.75 0 0 1 0-1.06l1.06-1.061a.75.75 0 1 1 1.061 1.06l-1.06 1.061a.75.75 0 0 1-1.061 0Zm9.193-9.193a.75.75 0 0 1 0-1.06l1.061-1.061a.75.75 0 1 1 1.06 1.06l-1.06 1.061a.75.75 0 0 1-1.06 0Z"/></svg>';
  var moonSvg = '<svg viewBox="0 0 16 16"><path d="M9.598 1.591a.749.749 0 0 1 .785-.175 7.001 7.001 0 1 1-8.967 8.967.75.75 0 0 1 .961-.96 5.5 5.5 0 0 0 7.046-7.046.75.75 0 0 1 .175-.786Zm1.616 1.945a7 7 0 0 1-7.678 7.678 5.499 5.499 0 1 0 7.678-7.678Z"/></svg>';
  var ghSvg = '<svg viewBox="0 0 16 16"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/></svg>';

  /* --- Theme toggle --- */
  var currentTheme = localStorage.getItem('jtd-theme') || 'dark';
  var theme = mkBtn(currentTheme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode', currentTheme === 'dark' ? sunSvg : moonSvg);
  theme.btn.addEventListener('click', function() {
    var t = document.documentElement.getAttribute('data-theme');
    var n = t === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', n);
    localStorage.setItem('jtd-theme', n);
    theme.btn.innerHTML = n === 'dark' ? sunSvg : moonSvg;
    theme.btn.setAttribute('title', n === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
  });
  auxNav.appendChild(theme.li);

  /* --- GitHub link --- */
  var gh = mkLink('View on GitHub', 'https://github.com/theomonfort/theomonfort', ghSvg);
  auxNav.appendChild(gh.li);
});
</script>
