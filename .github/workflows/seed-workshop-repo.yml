# Seed the GitHub Copilot Workshop repo.
#
# Mirrors the latest playbook Markdown content and the images it references from
# this repository into theomonfort/Github-copilot-workshop, then opens a pull
# request there with the changes.
#
# This is a plain GitHub Action (no AI / agentic engine): the work is fully
# deterministic (rsync + git), so it runs cheaply and predictably.
#
# Requires the GH_AW_SIDE_REPO_PAT secret: a token with `contents: write` and
# `pull-requests: write` on theomonfort/Github-copilot-workshop.
name: Seed the Copilot Workshop Repository

on:
  # Weekly safety net (Tuesday 00:00 UTC / 09:00 JST) plus manual runs.
  schedule:
    - cron: "0 0 * * 2"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: seed-workshop-repo
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source (this repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout workshop repo
        uses: actions/checkout@v4
        with:
          repository: theomonfort/Github-copilot-workshop
          path: workshop-repo
          fetch-depth: 1
          token: ${{ secrets.GH_AW_SIDE_REPO_PAT }}

      - name: Mirror playbook Markdown content
        run: |
          set -euo pipefail
          mkdir -p workshop-repo/src/content/playbook
          # Only .md playbook files (both locales); hands-on/.mdx is excluded.
          rsync -a --delete \
            --include='*/' --include='*.md' --exclude='*' \
            src/content/playbook/ workshop-repo/src/content/playbook/

      - name: Mirror images and assets
        run: |
          set -euo pipefail
          mkdir -p workshop-repo/public
          # Mirror public/ except /room/ and hands-on screenshots, keeping the
          # single hands-on image the playbook references.
          rsync -a --delete \
            --include='/handson/' \
            --include='/handson/img/' \
            --include='/handson/img/intro-context-window.png' \
            --exclude='/handson/**' \
            --exclude='/room/' \
            public/ workshop-repo/public/

      - name: Sanitize copied content
        run: |
          set -euo pipefail
          # Strip this repo's /theomonfort deploy base and drop links to the
          # live playbook site, so the workshop repo gets clean, base-agnostic
          # content. Only path-leading /theomonfort/ is stripped, so the
          # workshop self-link (github.com/theomonfort/Github-copilot-workshop)
          # is preserved.
          node - <<'NODE'
          const { readdirSync, readFileSync, writeFileSync, statSync } = require('node:fs');
          const { join } = require('node:path');
          const ROOT = 'workshop-repo/src/content/playbook';
          // Strip a path-leading /theomonfort/ (asset paths, internal links)
          // but never the host in github.com/theomonfort/... self-links. The
          // captured boundary char (quote, paren, space, newline, ...) is
          // re-emitted so only a true path-leading base is removed.
          const stripBase = (s) => s.replace(/(^|[^A-Za-z0-9.\-])\/theomonfort\//g, '$1/');
          // Within the YAML frontmatter only, drop any links: entry whose
          // block references the live site, regardless of field order.
          const dropSiteLinks = (s) => {
            const m = s.match(/^(---\n[\s\S]*?\n---\n)([\s\S]*)$/);
            if (!m) return s;
            const fmLines = m[1].split('\n');
            const body = m[2];
            const out = [];
            for (let i = 0; i < fmLines.length; i++) {
              const line = fmLines[i];
              if (/^\s*-\s/.test(line)) {
                const indent = line.match(/^\s*/)[0].length;
                let j = i + 1;
                while (
                  j < fmLines.length &&
                  fmLines[j].trim() !== '' &&
                  fmLines[j].match(/^\s*/)[0].length > indent
                ) j++;
                const block = fmLines.slice(i, j).join('\n');
                if (/theomonfort\.github\.io/.test(block)) { i = j - 1; continue; }
                for (let k = i; k < j; k++) out.push(fmLines[k]);
                i = j - 1;
              } else {
                out.push(line);
              }
            }
            return out.join('\n') + body;
          };
          const walk = (dir) => {
            for (const e of readdirSync(dir)) {
              const p = join(dir, e);
              if (statSync(p).isDirectory()) walk(p);
              else if (p.endsWith('.md')) writeFileSync(p, stripBase(dropSiteLinks(readFileSync(p, 'utf8'))));
            }
          };
          walk(ROOT);
          NODE

      - name: Build pull request body
        id: body
        run: |
          set -euo pipefail
          git -C workshop-repo add -A

          DATE=$(date -u +%Y-%m-%d)
          ns=$(git -C workshop-repo diff --cached --no-renames --name-status || true)
          stat=$(git -C workshop-repo diff --cached --stat | head -n 80 || true)

          classify() {
            printf '%s\n' "$ns" | awk -v s="$1" -v re="$2" \
              'BEGIN{c=0} $1==s && $2 ~ re {c++} END{print c}'
          }
          MD='^src/content/playbook/.*\.md$'
          ASSET='^public/'

          md_add=$(classify A "$MD"); md_mod=$(classify M "$MD"); md_del=$(classify D "$MD")
          as_add=$(classify A "$ASSET"); as_mod=$(classify M "$ASSET"); as_del=$(classify D "$ASSET")

          {
            echo "date=$DATE"
            echo "pr_body<<__BODY__"
            echo "Automated sync of playbook content and images from \`${GITHUB_REPOSITORY}\`."
            echo
            echo "**Playbook Markdown:** ${md_add} added, ${md_mod} updated, ${md_del} removed"
            echo "**Images / assets:** ${as_add} added, ${as_mod} updated, ${as_del} removed"
            echo
            echo '<details><summary>Changed files</summary>'
            echo
            echo '```'
            echo "$stat"
            echo '```'
            echo '</details>'
            echo
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "__BODY__"
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          path: workshop-repo
          token: ${{ secrets.GH_AW_SIDE_REPO_PAT }}
          branch: content-sync/seed-workshop
          delete-branch: true
          title: "[content-sync] Sync latest content and images (${{ steps.body.outputs.date }})"
          body: ${{ steps.body.outputs.pr_body }}
          commit-message: "[content-sync] Sync latest content and images (${{ steps.body.outputs.date }})"
          labels: |
            content-sync
            automation
